<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Business Insights | Query Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#bc000a",
                        "background": "#fbf9f8",
                        "surface": "#f0eded",
                        "on-surface": "#1b1c1c",
                    },
                    fontFamily: { "headline": ["Public Sans", "sans-serif"], "body": ["Public Sans", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .focus-ring:focus { outline: 3px solid #bc000a; outline-offset: 2px; }
        * { border-radius: 0px !important; }
        /* Simple scrollbar for sidebar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bc000a; }
    </style>
</head>
<body class="bg-background text-on-surface font-body">

<header class="fixed top-0 z-50 w-full bg-white flex justify-between items-center px-6 h-16 border-b border-zinc-200">
    <div class="flex items-center gap-8">
        <span class="text-xl font-black text-primary uppercase tracking-tighter font-headline">Business Insights</span>
        <nav class="hidden md:flex gap-6 items-center h-full">
            <a class="text-primary border-b-2 border-primary font-bold text-sm h-16 flex items-center px-2" href="index.html">Query Editor</a>
            <a class="text-zinc-600 hover:text-primary font-medium text-sm h-16 flex items-center px-2 transition-colors" href="documentation.html">Documentation</a>
        </nav>
    </div>
</header>

<div class="flex min-h-screen pt-16">
    <aside class="fixed left-0 h-screen w-72 bg-surface flex flex-col border-r border-zinc-200 z-40">
        <div class="p-6 border-b border-zinc-300 bg-zinc-100">
            <h2 class="text-primary font-bold text-lg">Saved Queries</h2>
        </div>
        
        <div class="p-4 bg-zinc-50 border-b border-zinc-300">
            <input type="text" id="new-query-name" placeholder="Query Name..." class="w-full text-xs p-2 mb-2 border border-zinc-300 focus:ring-1 focus:ring-primary outline-none">
            <button onclick="addSavedQuery()" class="w-full bg-zinc-800 text-white text-[10px] font-bold uppercase py-2 hover:bg-black transition-colors">
                + Save Current SQL
            </button>
        </div>

        <nav id="saved-queries-list" class="flex-1 overflow-y-auto custom-scroll py-2">
        </nav>
    </aside>

    <main class="flex-1 ml-72 p-8">
        <div class="max-w-6xl mx-auto space-y-8">
            <header class="border-l-4 border-primary pl-6 py-2">
                <h1 class="text-4xl font-bold tracking-tight">Query Terminal</h1>
                <p class="text-sm text-zinc-500 uppercase tracking-widest mt-1">Business Insights Team | Production</p>
            </header>

            <section class="bg-white p-6 border border-zinc-200 shadow-sm">
                <div class="flex justify-between items-end mb-4">
                    <label class="text-xs font-bold uppercase tracking-widest" for="sql-editor">SQL Input</label>
                    <span class="font-mono text-[10px] text-zinc-500 bg-zinc-100 px-2 py-1 uppercase">Standard: ISO 9075</span>
                </div>
                <textarea id="sql-editor" aria-label="Enter SQL Query" class="w-full h-64 bg-zinc-50 p-6 font-mono text-sm border-b-2 border-zinc-300 focus:border-primary focus:ring-0 outline-none resize-none leading-relaxed" spellcheck="false">-- Select a saved query or type here...</textarea>
                <div class="mt-4 flex justify-end">
                    <button id="btn-execute" class="flex items-center gap-2 px-8 py-4 bg-primary text-white font-bold uppercase text-xs tracking-widest hover:brightness-110 transition-all focus-ring">
                        <span class="material-symbols-outlined text-base">play_arrow</span> Execute Query
                    </button>
                </div>
            </section>

            <div class="flex justify-between items-center">
                <h2 class="text-xl font-bold">Results Preview</h2>
                <button id="btn-export" class="flex items-center gap-2 px-4 py-2 border-2 border-primary text-primary font-bold uppercase text-xs tracking-widest hover:bg-primary hover:text-white transition-all focus-ring">
                    <span class="material-symbols-outlined text-base">download</span> Download Excel
                </button>
            </div>

            <div id="results-container" class="overflow-x-auto border border-zinc-200 bg-white min-h-[200px] flex items-center justify-center">
                <p class="text-zinc-400 italic text-sm font-mono">Run query to populate results...</p>
            </div>
        </div>
    </main>
</div>

<script>
    const sqlEditor = document.getElementById('sql-editor');
    const queriesList = document.getElementById('saved-queries-list');
    const queryNameInput = document.getElementById('new-query-name');
    const API_URL = "http://localhost:8000/api";

    // 1. Fetch data from Python on page load
    async function loadSavedQueries() {
        try {
            const response = await fetch(`${API_URL}/queries`);
            const data = await response.json();
            // Clear the current list and render the new data
            savedQueries = data; 
            renderQueries();
        } catch (err) {
            console.error("Could not connect to Python backend:", err);
        }
    }

    // 2. Update the Execute Button logic
    async function executeQuery() {
        const sql = document.getElementById('sql-editor').value;
        const btn = document.getElementById('btn-execute');
        const resultsContainer = document.getElementById('results-container');
        
        // 1. Visual feedback
        btn.innerText = "Running...";
        resultsContainer.innerHTML = '<p class="text-zinc-400 animate-pulse font-mono">Executing query on server...</p>';
        
        try {
            const response = await fetch(`${API_URL}/execute`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql: sql })
            });
            const result = await response.json();
            
            // 2. Check if the backend returned an error message
            if (response.status !== 200) {
                resultsContainer.innerHTML = `<p class="text-red-600 font-mono text-sm p-4">Error: ${result.detail}</p>`;
                return;
            }

            // 3. Render the data into the table (No more alert pop-up!)
            renderTable(result.data);
            
        } catch (err) {
            resultsContainer.innerHTML = `<p class="text-red-600 font-mono text-sm p-4">Connection Failed: ${err.message}</p>`;
        } finally {
            btn.innerHTML = '<span class="material-symbols-outlined text-base">play_arrow</span> Execute Query';
        }
    }

    // Helper function to build the HTML table dynamically
    function renderTable(data) {
        const container = document.getElementById('results-container');
        
        if (!data || data.length === 0) {
            container.innerHTML = '<p class="text-zinc-400 italic text-sm p-8">Query returned 0 rows.</p>';
            return;
        }

        // Get headers from the first object keys
        const headers = Object.keys(data[0]);
        
        let html = `
            <table class="w-full text-left border-collapse">
                <thead class="bg-zinc-100 border-b-2 border-zinc-200">
                    <tr>
                        ${headers.map(h => `<th class="px-4 py-2 text-[10px] font-black uppercase tracking-widest text-zinc-600">${h}</th>`).join('')}
                    </tr>
                </thead>
                <tbody class="divide-y divide-zinc-100">
                    ${data.map(row => `
                        <tr class="hover:bg-zinc-50 transition-colors">
                            ${headers.map(h => `<td class="px-4 py-3 text-sm font-mono text-zinc-700">${row[h] !== null ? row[h] : '<span class="text-zinc-300">NULL</span>'}</td>`).join('')}
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `;
        
        container.innerHTML = html;
    }

    function renderQueries() {
        queriesList.innerHTML = '';
        savedQueries.forEach(q => {
            const div = document.createElement('div');
            div.className = "group flex items-center border-b border-zinc-200/50 hover:bg-zinc-300 transition-colors";
            
            div.innerHTML = `
                <button onclick="pasteQuery(\`${q.sql}\`)" class="flex-1 text-left px-6 py-3 text-xs font-bold uppercase flex justify-between items-center">
                    <span>${q.name}</span>
                </button>
                <button onclick="deleteQuery(${q.id})" class="px-4 py-3 text-zinc-400 hover:text-primary opacity-0 group-hover:opacity-100 transition-all" title="Delete Query">
                    <span class="material-symbols-outlined text-sm">delete</span>
                </button>
            `;
            queriesList.appendChild(div);
        });
    }

    function pasteQuery(sql) {
        sqlEditor.value = sql;
        sqlEditor.classList.add('bg-yellow-50');
        setTimeout(() => sqlEditor.classList.remove('bg-yellow-50'), 300);
    }

    async function addSavedQuery() {
        const name = queryNameInput.value.trim();
        const sql = sqlEditor.value.trim();

        if (!name || !sql || sql === "-- Select a saved query or type here...") {
            alert("Please enter a name and valid SQL code.");
            return;
        }

        try {
            const response = await fetch(`${API_URL}/queries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, sql })
            });

            if (response.ok) {
                queryNameInput.value = "";
                // Re-fetch from DB so the sidebar is perfectly in sync
                loadSavedQueries(); 
            } else {
                alert("Failed to save query to database.");
            }
        } catch (err) {
            console.error("Error saving query:", err);
        }
    }

    async function deleteQuery(id) {
        if (confirm("Are you sure you want to delete this saved query?")) {
            try {
                const response = await fetch(`${API_URL}/queries/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    loadSavedQueries(); // Refresh the list
                } else {
                    alert("Failed to delete query.");
                }
            } catch (err) {
                console.error("Error deleting query:", err);
            }
        }
    }

    async function downloadExcel() {
        const sql = document.getElementById('sql-editor').value;
        const btn = document.getElementById('btn-export');
        
        // Visual feedback
        const originalContent = btn.innerHTML;
        btn.innerText = "Generating...";

        try {
            const response = await fetch(`${API_URL}/export`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ sql: sql })
            });

            if (response.status !== 200) {
                const error = await response.json();
                alert("Export failed: " + error.detail);
                return;
            }

            // Convert the response to a "Blob" (Binary Large Object)
            const blob = await response.blob();
            
            // Create a temporary link to trigger the download
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            // This creates a format like: Business_Insights_2026-03-20_22-07-57.xlsx
            const timestamp = new Date().toISOString().replace(/T/, '_').replace(/:/g, '-').split('.')[0];
            a.download = `Business_Insights_${timestamp}.xlsx`;
                        
            document.body.appendChild(a);
            a.click();
            
            // Cleanup
            window.URL.revokeObjectURL(url);
            document.body.removeChild(a);

        } catch (err) {
            alert("Export connection error: " + err.message);
        } finally {
            btn.innerHTML = originalContent;
        }
    }

    // Attach the function to the export button
    document.getElementById('btn-export').onclick = downloadExcel;

    // Attach the function to your button
    document.getElementById('btn-execute').onclick = executeQuery;

    // Run load on start
    window.onload = loadSavedQueries;

    // Initial load
    renderQueries();
</script>

</body>
</html>
