<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Business Insights | Query Editor</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#bc000a",
                        "background": "#fbf9f8",
                        "surface": "#f0eded",
                        "on-surface": "#1b1c1c",
                    },
                    fontFamily: { "headline": ["Public Sans", "sans-serif"], "body": ["Public Sans", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .focus-ring:focus { outline: 3px solid #bc000a; outline-offset: 2px; }
        * { border-radius: 0px !important; }
        /* Simple scrollbar for sidebar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bc000a; }
    </style>
</head>
<body class="bg-background text-on-surface font-body">

<header class="fixed top-0 z-50 w-full bg-white flex justify-between items-center px-6 h-16 border-b border-zinc-200">
    <div class="flex items-center gap-8">
        <span class="text-xl font-black text-primary uppercase tracking-tighter font-headline">Business Insights</span>
        <nav class="hidden md:flex gap-6 items-center h-full">
            <a class="text-primary border-b-2 border-primary font-bold text-sm h-16 flex items-center px-2" href="index.html">Query Editor</a>
            <a class="text-zinc-600 hover:text-primary font-medium text-sm h-16 flex items-center px-2 transition-colors" href="documentation.html">Documentation</a>
        </nav>
    </div>
</header>

<div class="flex min-h-screen pt-16">
    <aside class="sticky top-16 h-[calc(100vh-64px)] w-72 bg-surface flex flex-col border-r border-zinc-200 z-40 shrink-0">
        <div class="p-6 border-b border-zinc-300 bg-zinc-100">
            <h2 class="text-primary font-bold text-lg">Saved Queries</h2>
        </div>
        
        <div class="p-4 bg-zinc-50 border-b border-zinc-300">
            <input type="text" id="new-query-name" placeholder="Query Name..." class="w-full text-xs p-2 mb-2 border border-zinc-300 focus:ring-1 focus:ring-primary outline-none">
            <button id="btn-save-query" class="w-full bg-zinc-800 text-white text-[10px] font-bold uppercase py-2 hover:bg-black transition-colors">
                + Save Current SQL
            </button>
        </div>

        <nav id="saved-queries-list" class="flex-1 overflow-y-auto custom-scroll py-2">
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-hidden min-w-0">
        <div class="max-w-full mx-auto space-y-8">
            <header class="border-l-4 border-primary pl-6 py-2">
                <h1 class="text-xl font-bold tracking-tight">Query Terminal</h1>
            </header>

            <section class="bg-white p-6 border border-zinc-200 shadow-sm">
                <div class="flex justify-between items-end mb-4">
                    <label class="text-xs font-bold uppercase tracking-widest" for="sql-editor">SQL Input</label>
                </div>
                <textarea id="sql-editor" aria-label="Enter SQL Query" class="w-full h-64 bg-zinc-50 p-6 font-mono text-sm border-b-2 border-zinc-300 focus:border-primary focus:ring-0 outline-none resize-none leading-relaxed" spellcheck="false">-- Select a saved query or type here...</textarea>
                <div class="mt-4 flex justify-end">
                    <button id="btn-execute" class="flex items-center gap-2 px-4 py-2 bg-primary text-white font-bold uppercase text-xs tracking-widest hover:brightness-110 transition-all focus-ring">
                        <span class="material-symbols-outlined text-base">play_arrow</span> Execute Query
                    </button>
                </div>
            </section>

            <div class="flex justify-between items-center">
                <header class="border-l-4 border-primary pl-6 py-2">
                    <h2 class="text-xl font-bold">Results Preview</h2>
                </header>
                <button id="btn-export" class="flex items-center gap-2 px-4 py-2 border-2 border-primary text-primary font-bold uppercase text-xs tracking-widest hover:bg-primary hover:text-white transition-all focus-ring">
                    <span class="material-symbols-outlined text-base">download</span> Download Excel
                </button>
            </div>

            <div id="results-container" class="overflow-x-auto border border-zinc-200 bg-white min-h-[200px] w-full">
                <div class="flex items-center justify-center h-full p-8">
                    <p class="text-zinc-400 italic text-sm font-mono">Run query to populate results...</p>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/static/js/index.js"></script>

</body>
</html>
